server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  h2:
    console:
      enabled: false

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
