services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SERVER_PORT: "8081"

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: "8080"
      ACCOUNT_SERVICE_URL: http://account-service:8081
    depends_on:
      - account-service
