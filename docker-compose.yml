services:
  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    ports:
      - "${ACCOUNT_SERVICE_PORT:-8081}:8081"
    environment:
      SERVER_PORT: "8081"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    environment:
      SERVER_PORT: "8080"
      ACCOUNT_SERVICE_URL: http://account-service:8081
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
